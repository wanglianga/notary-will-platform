server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/notary-will;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

jwt:
  secret: notary-will-platform-secret-key-must-be-at-least-256-bits-long
  expiration: 86400000

file:
  upload-dir: uploads
